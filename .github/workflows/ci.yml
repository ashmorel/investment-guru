name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: guru
          POSTGRES_PASSWORD: guru
          POSTGRES_DB: guru_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - name: Exercise the alembic migration chain
        run: |
          psql postgresql://guru:guru@localhost:5433/postgres -c 'CREATE DATABASE guru_migrate;'
          DATABASE_URL=postgresql+asyncpg://guru:guru@localhost:5433/guru_migrate alembic upgrade head
          DATABASE_URL=postgresql+asyncpg://guru:guru@localhost:5433/guru_migrate alembic downgrade base
          DATABASE_URL=postgresql+asyncpg://guru:guru@localhost:5433/guru_migrate alembic upgrade head
      - run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
